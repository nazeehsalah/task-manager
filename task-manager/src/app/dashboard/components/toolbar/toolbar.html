<div class="toolbar-container">
  <div class="status-tabs-wrapper">
    <mat-tab-group animationDuration="0ms" class="status-tabs" [mat-stretch-tabs]="false" [disableRipple]="true">
      <mat-tab label="All"></mat-tab>
      <mat-tab label="To Do"></mat-tab>
      <mat-tab label="In Progress"></mat-tab>
      <mat-tab label="Done"></mat-tab>
    </mat-tab-group>
  </div>

  <div class="toolbar-actions">
    <button mat-stroked-button class="priority-btn">
      Priority <mat-icon iconPositionEnd>arrow_drop_down</mat-icon>
    </button>
    <button mat-flat-button color="primary" class="priority-btn">
      <mat-icon>add</mat-icon>
      New Task
    </button>
  </div>
</div>
